name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  RUFF_VERSION: "0.8.4"
  PYRIGHT_VERSION: "1.1.40"
  BANDIT_VERSION: "1.8.3"
  PIP_AUDIT_VERSION: "2.10.1"
  CYCLONEDX_VERSION: "5.1.1"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Ruff
        run: pip install ruff==${{ env.RUFF_VERSION }}

      - name: Run Ruff Linter
        run: ruff check src tests --output-format=github

      - name: Run Ruff Formatter Check
        run: ruff format --check src tests

  typecheck:
    name: Type Check (Pyright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyright==${{ env.PYRIGHT_VERSION }}
          pip install -e ".[dev]" 2>&1 | tail -5

      - name: Run Pyright
        run: PYTHONPATH=src pyright src tests

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit==${{ env.BANDIT_VERSION }}
          pip install pip-audit==${{ env.PIP_AUDIT_VERSION }}
          pip install cyclonedx-bom==${{ env.CYCLONEDX_VERSION }}
          pip install -e ".[dev]" 2>&1 | tail -5

      - name: Bandit SAST (fail on HIGH/MEDIUM)
        run: |
          bandit -r src/ -ll -f json -o bandit-report.json
          python -c "
import json, sys
with open('bandit-report.json') as f:
    data = json.load(f)
high_med = [r for r in data.get('results', []) if r['issue_severity'] in ('HIGH', 'MEDIUM')]
if high_med:
    print(f'FAIL: {len(high_med)} HIGH/MEDIUM findings')
    for r in high_med:
        print(f'  {r[\"filename\"]}:{r[\"line_number\"]} - {r[\"issue_text\"]}')
    sys.exit(1)
print('PASS: No HIGH/MEDIUM Bandit findings')
          "

      - name: pip-audit (fail on known vulns)
        run: |
          pip-audit -r requirements.txt --skip-editable --format json -o pip-audit.json || true
          python -c "
import json, sys
try:
    with open('pip-audit.json') as f:
        data = json.load(f)
except:
    data = []
vulns = [v for v in data if v.get('vulns')]
if vulns:
    print(f'FAIL: {len(vulns)} packages with known vulnerabilities')
    for v in vulns:
        for vuln in v['vulns']:
            print(f'  {v[\"name\"]}=={v[\"version\"]}: {vuln[\"id\"]}')
    sys.exit(1)
print('PASS: No known vulnerabilities in dependencies')
          "

      - name: Generate CycloneDX SBOM
        run: cyclonedx-py environment --output-format JSON --outfile sbom.json

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3
        with:
          sarif_file: bandit-report.json
          category: bandit

  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e ".[dev]" 2>&1 | tail -5

      - name: Run tests with coverage
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short \
            --cov=redteam \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -W error::DeprecationWarning \
            -W error::PendingDeprecationWarning

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 30

      - name: Verify test collection
        run: |
          count=$(PYTHONPATH=src python -m pytest tests/ --collect-only -q 2>/dev/null | tail -1 | grep -oP '\d+(?= tests)')
          count=${count:-0}
          if [ "$count" -lt 10 ]; then
            echo "Expected at least 10 tests collected, got $count"
            exit 1
          fi
          echo "Collected $count tests"

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        language: ['python']
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Initialize CodeQL
        uses: github/codeql-action/init@192325c86100d080feab897ff886c34abd4c83a3
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@192325c86100d080feab897ff886c34abd4c83a3
        with:
          category: "/language:${{ matrix.language }}"

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ hashFiles('Dockerfile*') != '' }}
    permissions:
      security-events: write
      contents: read
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ hashFiles('Dockerfile*') != '' }}
    needs: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf6a131da664145234b62ab1e7f5a1d6d7a8

      - name: Build Docker image (no push)
        uses: docker/build-push-action@471d1dc4e07e5cded4c449d1b0c8a2b6e3d2f7d8
        with:
          context: .
          push: false
          load: true
          tags: local/test:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [lint, typecheck, security, test, codeql]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc